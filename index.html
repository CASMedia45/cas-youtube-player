<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAS YouTube Player</title>

<style>
html, body {
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

iframe {
    width:100%;
    height:100%;
    border:0;
}
</style>

</head>

<body>

<iframe
id="youtube"
allow="autoplay; encrypted-media; fullscreen"
allowfullscreen>
</iframe>

<script>

const params = new URLSearchParams(window.location.search);

const videoId = params.get("videoId");

if (videoId) {

    document.getElementById("youtube").src =
    "https://www.youtube.com/embed/" 
    + videoId
    + "?autoplay=1"
    + "&mute=0"
    + "&controls=0"
    + "&loop=1"
    + "&playlist=" + videoId
    + "&rel=0"
    + "&playsinline=1";

} else {

    document.body.innerHTML =
    "<h1 style='color:white;text-align:center;'>No video ID provided</h1>";

}

</script>

</body>
</html>
