<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CAS YouTube Player</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
}

#player{
    width:100%;
    height:100%;
}
</style>

<script src="https://www.youtube.com/iframe_api"></script>

</head>

<body>

<div id="player"></div>

<script>

const params = new URLSearchParams(window.location.search);

const videoId = params.get("videoId");

const autoplay = params.get("autoplay") || "1";
const mute = params.get("mute") || "0";
const controls = params.get("controls") || "0";
const loop = params.get("loop") || "1";
const rel = params.get("rel") || "0";

let player;

function onYouTubeIframeAPIReady(){

    player = new YT.Player("player",{

        width:"100%",
        height:"100%",

        videoId:videoId,

        playerVars:{
            autoplay:Number(autoplay),
            controls:Number(controls),
            rel:Number(rel),
            loop:Number(loop),
            playlist:videoId,
            playsinline:1,
            modestbranding:1,
            iv_load_policy:3,
            fs:0
        },

        events:{
            onReady:onPlayerReady
        }

    });

}

function onPlayerReady(event){

    if(mute==="1"){
        event.target.mute();
    }else{
        event.target.unMute();
    }

    event.target.playVideo();

}

</script>

</body>
</html>
